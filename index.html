<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pemesanan Tiket</title>
    <!-- Menggunakan Tailwind CSS untuk styling yang cepat dan modern -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-bold text-blue-600 mb-2">Sistem Pemesanan Tiket</h1>
            <p class="text-gray-500">Pesan tiketmu sekarang dan data akan tersimpan langsung ke Firebase!</p>
        </header>

        <!-- Tempat untuk menampilkan pesan sukses/error -->
        <div id="notifikasi" class="hidden mb-6 p-4 rounded-lg text-white font-medium text-center transition-all duration-300">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- Bagian Kiri: Formulir Pemesanan -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-semibold mb-6 border-b pb-2">Form Formulir Baru</h2>
                
                <form id="form-pemesanan" class="space-y-4">
                    <div>
                        <label for="nama" class="block text-sm font-medium text-gray-700 mb-1">Nama Pemesan</label>
                        <input type="text" id="nama" required placeholder="Masukkan nama lengkap" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    </div>
                    
                    <div>
                        <label for="jenis" class="block text-sm font-medium text-gray-700 mb-1">Jenis Tiket</label>
                        <select id="jenis" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white transition-all">
                            <option value="Reguler">Reguler</option>
                            <option value="VIP">VIP</option>
                            <option value="VVIP">VVIP</option>
                        </select>
                    </div>
                    
                    <div>
                        <label for="jumlah" class="block text-sm font-medium text-gray-700 mb-1">Jumlah Tiket</label>
                        <input type="number" id="jumlah" required min="1" value="1" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    </div>
                    
                    <button type="submit" id="btn-submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg shadow-md transition-colors duration-200 mt-4">
                        Pesan Sekarang
                    </button>
                </form>
            </div>

            <!-- Bagian Kanan: Daftar Pesanan (Real-time) -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center border-b pb-2 mb-4">
                    <h2 class="text-xl font-semibold">Daftar Pesanan</h2>
                    <span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full font-medium">Real-time</span>
                </div>
                
                <div id="daftar-tiket" class="space-y-3 overflow-y-auto max-h-[400px] pr-2">
                    <div class="flex justify-center items-center py-8 text-gray-400">
                        <svg class="animate-spin h-6 w-6 mr-3" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="10" stroke-width="4" stroke-opacity="0.25"></circle>
                            <path d="M12 2a10 10 0 0 1 10 10" stroke-width="4" stroke-linecap="round"></path>
                        </svg>
                        Memuat data dari Firebase...
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Script Firebase & Logika Aplikasi -->
    <script type="module">
        // 1. Import layanan Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            onSnapshot, 
            serverTimestamp,
            query,
            orderBy 
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // 2. Konfigurasi Firebase milikmu
        const firebaseConfig = {
            apiKey: "AIzaSyBPzVaOwVo7Vny6Zd1Hfuyn21neRAH5GQs",
            authDomain: "absen-fa8b4.firebaseapp.com",
            projectId: "absen-fa8b4",
            storageBucket: "absen-fa8b4.firebasestorage.app",
            messagingSenderId: "186875255423",
            appId: "1:186875255423:web:515159bf18f393de28fd4a",
            measurementId: "G-M8P1JXK4XZ"
        };

        // 3. Inisialisasi Firebase & Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 4. Referensi Elemen DOM
        const formPemesanan = document.getElementById('form-pemesanan');
        const daftarTiket = document.getElementById('daftar-tiket');
        const notifikasi = document.getElementById('notifikasi');
        const btnSubmit = document.getElementById('btn-submit');

        // Referensi ke koleksi "pesanan_tiket"
        const tiketCollection = collection(db, "pesanan_tiket");
        // Membuat query untuk mengurutkan data terbaru di atas
        const tiketQuery = query(tiketCollection, orderBy("waktuPesan", "desc"));

        // Fungsi pembantu untuk menampilkan pesan (menggantikan alert)
        function tampilkanPesan(pesan, tipe = 'sukses') {
            notifikasi.textContent = pesan;
            notifikasi.classList.remove('hidden', 'bg-green-500', 'bg-red-500');
            
            if (tipe === 'sukses') {
                notifikasi.classList.add('bg-green-500');
            } else {
                notifikasi.classList.add('bg-red-500');
            }

            // Sembunyikan otomatis setelah 3 detik
            setTimeout(() => {
                notifikasi.classList.add('hidden');
            }, 3000);
        }

        // --- A. Logika Menyimpan Data (Menambah Tiket) ---
        formPemesanan.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            // Ubah tombol jadi status loading
            const originalText = btnSubmit.textContent;
            btnSubmit.textContent = "Menyimpan...";
            btnSubmit.disabled = true;
            btnSubmit.classList.add('opacity-70');

            const nama = document.getElementById('nama').value;
            const jenis = document.getElementById('jenis').value;
            const jumlah = document.getElementById('jumlah').value;

            try {
                // Simpan ke Firestore
                await addDoc(tiketCollection, {
                    nama: nama,
                    jenis: jenis,
                    jumlah: parseInt(jumlah),
                    waktuPesan: serverTimestamp() 
                });
                
                tampilkanPesan('✅ Tiket berhasil dipesan!');
                formPemesanan.reset(); 
            } catch (error) {
                console.error("Error menambah tiket:", error);
                tampilkanPesan('Gagal menyimpan ke Firebase. Cek console/rules database Anda.', 'error');
            } finally {
                // Kembalikan tombol ke keadaan semula
                btnSubmit.textContent = originalText;
                btnSubmit.disabled = false;
                btnSubmit.classList.remove('opacity-70');
            }
        });

        // --- B. Logika Menampilkan Data secara Real-time ---
        onSnapshot(tiketQuery, (snapshot) => {
            daftarTiket.innerHTML = ''; // Bersihkan kontainer
            
            if (snapshot.empty) {
                daftarTiket.innerHTML = `
                    <div class="text-center py-6 text-gray-500 bg-gray-50 rounded-lg border border-dashed border-gray-300">
                        Belum ada pesanan tiket saat ini.
                    </div>`;
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                
                // Format tanggal (handling jika serverTimestamp belum masuk)
                let waktuText = "Baru saja";
                if (data.waktuPesan) {
                    const date = data.waktuPesan.toDate();
                    waktuText = date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + ' WIB';
                }

                // Tentukan warna badge berdasarkan jenis tiket
                let badgeColor = "bg-gray-200 text-gray-800";
                if (data.jenis === "VIP") badgeColor = "bg-purple-100 text-purple-800";
                if (data.jenis === "VVIP") badgeColor = "bg-yellow-100 text-yellow-800";
                if (data.jenis === "Reguler") badgeColor = "bg-blue-100 text-blue-800";

                // Buat elemen card untuk setiap pesanan
                const item = document.createElement('div');
                item.className = 'bg-gray-50 p-4 rounded-xl border border-gray-200 hover:shadow-md transition-shadow';
                item.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <strong class="text-lg text-gray-800 truncate pr-2">${data.nama}</strong>
                        <span class="text-xs text-gray-400 whitespace-nowrap">${waktuText}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="${badgeColor} text-xs px-2.5 py-1 rounded-md font-semibold">${data.jenis}</span>
                        <span class="text-sm font-medium text-gray-600">${data.jumlah} Tiket</span>
                    </div>
                `;
                
                daftarTiket.appendChild(item);
            });
        }, (error) => {
            console.error("Error mengambil data real-time: ", error);
            daftarTiket.innerHTML = `
                <div class="text-center py-6 text-red-500 bg-red-50 rounded-lg border border-dashed border-red-300">
                    Gagal membaca data. Pastikan Firestore Rules Anda diizinkan untuk dibaca (Read).
                </div>`;
        });
    </script>
</body>
</html>
