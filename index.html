<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin Tiket</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake-animation { animation: shake 0.4s ease-in-out; }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none; margin: 0;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans relative pb-20">

    <div id="notifikasi" class="hidden fixed top-6 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded-full text-white font-medium shadow-lg transition-all duration-300 opacity-0 -translate-y-4">
    </div>

    <!-- MODAL KONFIRMASI POP-UP -->
    <div id="modal-konfirm" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-gray-900 bg-opacity-50 backdrop-blur-sm transition-opacity"></div>
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 relative z-10 transform transition-all scale-100">
            <div class="flex items-center justify-center w-12 h-12 mx-auto bg-blue-100 text-blue-600 rounded-full mb-4">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h3 id="modal-judul" class="text-xl font-bold text-center text-gray-800 mb-2">Konfirmasi</h3>
            <p id="modal-pesan" class="text-center text-gray-500 text-sm mb-6">Apakah Anda yakin ingin melanjutkan tindakan ini?</p>
            <div class="flex gap-3">
                <button id="btn-batal" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 rounded-xl transition-colors">Batal</button>
                <button id="btn-lanjut" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl transition-colors shadow-md">Ya, Lanjutkan</button>
            </div>
        </div>
    </div>

    <!-- HALAMAN LOGIN PIN -->
    <div id="login-screen" class="fixed inset-0 bg-slate-900 z-40 flex items-center justify-center p-4 transition-opacity duration-500">
        <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-sm text-center">
            <div class="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Area Admin</h2>
            <p class="text-gray-500 mb-8 text-sm">Masukkan 6 digit PIN rahasia Anda.</p>
            <form id="form-pin">
                <input type="password" id="input-pin" inputmode="numeric" maxlength="6" pattern="[0-9]*" required placeholder="••••••" 
                    class="w-full text-center text-3xl tracking-[1em] px-4 py-4 border-2 border-gray-200 rounded-xl focus:ring-0 focus:border-blue-500 outline-none transition-colors font-mono mb-6">
                <button type="submit" id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-colors">
                    Buka Dashboard
                </button>
            </form>
        </div>
    </div>

    <!-- HALAMAN DASHBOARD ADMIN -->
    <div id="dashboard-screen" class="hidden max-w-6xl mx-auto p-4 md:p-8">
        
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Manajemen Pesanan</h1>
                <p class="text-sm text-gray-500 flex items-center gap-2 mt-1">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    Live Data Firebase
                </p>
            </div>
            <button id="btn-logout" class="bg-red-50 text-red-600 hover:bg-red-100 font-semibold py-2 px-5 rounded-lg transition-colors flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Keluar
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gradient-to-r from-blue-500 to-blue-600 rounded-2xl p-6 text-white shadow-md relative overflow-hidden">
                <div class="relative z-10">
                    <h3 class="text-blue-100 text-sm font-medium mb-1">Total Tiket Terjual</h3>
                    <div class="text-3xl font-bold" id="stat-tiket">0</div>
                </div>
            </div>
            <div class="bg-gradient-to-r from-emerald-500 to-emerald-600 rounded-2xl p-6 text-white shadow-md relative overflow-hidden">
                <div class="relative z-10">
                    <h3 class="text-emerald-100 text-sm font-medium mb-1">Pendapatan (Lunas)</h3>
                    <div class="text-3xl font-bold" id="stat-uang">Rp 0</div>
                </div>
            </div>
            <div class="bg-gradient-to-r from-purple-500 to-purple-600 rounded-2xl p-6 text-white shadow-md relative overflow-hidden">
                <div class="relative z-10">
                    <h3 class="text-purple-100 text-sm font-medium mb-1">Telah Check-in (Hadir)</h3>
                    <div class="text-3xl font-bold" id="stat-hadir">0 Orang</div>
                </div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-4">
            <div class="relative w-full md:w-1/2">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <input type="text" id="input-search" placeholder="Cari nama, email, atau status (Lunas/Hadir)..." 
                    class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-shadow shadow-sm">
            </div>
            <button id="btn-export" class="w-full md:w-auto bg-gray-800 hover:bg-gray-900 text-white font-semibold py-2.5 px-5 rounded-xl transition-colors shadow-sm flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Export CSV
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div id="daftar-tiket" class="divide-y divide-gray-100 max-h-[700px] overflow-y-auto">
                <!-- Data dirender di sini -->
            </div>
            <div id="pesan-kosong" class="hidden text-center py-10 text-gray-500">
                Data tidak ditemukan.
            </div>
        </div>

    </div>

    <!-- Script Firebase & Logika -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // GANTI PIN DI SINI
        const PIN_RAHASIA = "123456"; 
        
        const firebaseConfig = {
            apiKey: "AIzaSyBPzVaOwVo7Vny6Zd1Hfuyn21neRAH5GQs",
            authDomain: "absen-fa8b4.firebaseapp.com",
            projectId: "absen-fa8b4",
            storageBucket: "absen-fa8b4.firebasestorage.app",
            messagingSenderId: "186875255423",
            appId: "1:186875255423:web:515159bf18f393de28fd4a",
            measurementId: "G-M8P1JXK4XZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tiketCollection = collection(db, "pesanan_tiket");
        const tiketQuery = query(tiketCollection, orderBy("waktuPesan", "desc"));
        let unsubscribeSnapshot = null;
        let semuaDataPesanan = [];

        const loginScreen = document.getElementById('login-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const formPin = document.getElementById('form-pin');
        const inputPin = document.getElementById('input-pin');
        const notifikasi = document.getElementById('notifikasi');
        const daftarTiket = document.getElementById('daftar-tiket');
        const statTiket = document.getElementById('stat-tiket');
        const statUang = document.getElementById('stat-uang');
        const statHadir = document.getElementById('stat-hadir'); 
        const btnLogout = document.getElementById('btn-logout');
        const inputSearch = document.getElementById('input-search');
        const pesanKosong = document.getElementById('pesan-kosong');
        const btnExport = document.getElementById('btn-export');

        const modalKonfirm = document.getElementById('modal-konfirm');
        const modalJudul = document.getElementById('modal-judul');
        const modalPesan = document.getElementById('modal-pesan');
        const btnBatal = document.getElementById('btn-batal');
        const btnLanjut = document.getElementById('btn-lanjut');

        let aksiTertunda = null;

        const formatRupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

        function tampilkanPesan(pesan, tipe = 'sukses') {
            notifikasi.textContent = pesan;
            notifikasi.className = `fixed top-6 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded-full text-white font-medium shadow-lg transition-all duration-300 ${tipe === 'sukses' ? 'bg-green-500' : 'bg-red-500'} translate-y-0 opacity-100`;
            setTimeout(() => {
                notifikasi.classList.replace('translate-y-0', '-translate-y-4');
                notifikasi.classList.replace('opacity-100', 'opacity-0');
            }, 3000);
        }

        function bukaModal(judul, pesan, dataAksi) {
            modalJudul.textContent = judul;
            modalPesan.textContent = pesan;
            aksiTertunda = dataAksi;
            
            if (dataAksi.tipe === 'hapus') {
                btnLanjut.className = "flex-1 bg-red-600 hover:bg-red-700 text-white font-semibold py-2.5 rounded-xl transition-colors shadow-md";
            } else {
                btnLanjut.className = "flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl transition-colors shadow-md";
            }
            modalKonfirm.classList.remove('hidden');
        }

        function tutupModal() {
            modalKonfirm.classList.add('hidden');
            aksiTertunda = null;
        }

        btnBatal.addEventListener('click', tutupModal);

        btnLanjut.addEventListener('click', async () => {
            if (!aksiTertunda) return;
            const { tipe, idDoc, statusBaru } = aksiTertunda;
            
            const originalText = btnLanjut.textContent;
            btnLanjut.textContent = "Memproses...";
            btnLanjut.disabled = true;

            try {
                if (tipe === 'lunas') {
                    await updateDoc(doc(db, "pesanan_tiket", idDoc), { statusLunas: statusBaru });
                    tampilkanPesan('Berhasil dikunci sebagai Lunas.', 'sukses');
                } else if (tipe === 'checkin') {
                    await updateDoc(doc(db, "pesanan_tiket", idDoc), { statusCheckin: statusBaru });
                    tampilkanPesan('Berhasil dikunci sebagai Check-in.', 'sukses');
                } else if (tipe === 'hapus') {
                    await deleteDoc(doc(db, "pesanan_tiket", idDoc));
                    tampilkanPesan('Pesanan berhasil dihapus.', 'sukses');
                }
            } catch (error) {
                console.error(error);
                tampilkanPesan('Gagal memproses tindakan. Cek koneksi.', 'error');
            } finally {
                btnLanjut.textContent = originalText;
                btnLanjut.disabled = false;
                tutupModal();
            }
        });

        formPin.addEventListener('submit', (e) => {
            e.preventDefault();
            if (inputPin.value === PIN_RAHASIA) {
                inputPin.blur();
                loginScreen.classList.add('opacity-0');
                setTimeout(() => {
                    loginScreen.classList.add('hidden');
                    dashboardScreen.classList.remove('hidden');
                    loadDataAdmin(); 
                    tampilkanPesan('Berhasil masuk ke Dashboard!', 'sukses');
                }, 500);
            } else {
                tampilkanPesan('PIN Salah!', 'error');
                inputPin.value = '';
                inputPin.classList.add('shake-animation', 'border-red-500');
                setTimeout(() => inputPin.classList.remove('shake-animation', 'border-red-500'), 400);
            }
        });

        btnLogout.addEventListener('click', () => {
            if (unsubscribeSnapshot) unsubscribeSnapshot(); 
            dashboardScreen.classList.add('hidden');
            loginScreen.classList.remove('hidden', 'opacity-0');
            inputPin.value = '';
            inputSearch.value = '';
            semuaDataPesanan = [];
            tampilkanPesan('Anda telah keluar.', 'sukses');
        });

        function loadDataAdmin() {
            unsubscribeSnapshot = onSnapshot(tiketQuery, (snapshot) => {
                daftarTiket.innerHTML = ''; 
                semuaDataPesanan = []; 
                
                let totalTiketHitung = 0;
                let totalUangLunas = 0;
                let totalHadirHitung = 0;

                if (snapshot.empty) {
                    pesanKosong.classList.remove('hidden');
                    pesanKosong.textContent = "Belum ada pesanan masuk saat ini.";
                    statTiket.textContent = '0';
                    statUang.textContent = 'Rp 0';
                    statHadir.textContent = '0 Orang';
                    return;
                } else {
                    pesanKosong.classList.add('hidden');
                }

                snapshot.forEach((dokumen) => {
                    const data = dokumen.data();
                    const isLunas = data.statusLunas === true; 
                    const isCheckin = data.statusCheckin === true;

                    semuaDataPesanan.push({ id: dokumen.id, ...data, isLunas, isCheckin });

                    totalTiketHitung += data.jumlah || 0;
                    if (isLunas) totalUangLunas += data.totalHarga || 0; 
                    if (isCheckin) totalHadirHitung += data.jumlah || 0; 

                    let waktuText = "Baru saja";
                    if (data.waktuPesan) {
                        const date = data.waktuPesan.toDate();
                        waktuText = date.toLocaleDateString('id-ID', { day:'numeric', month:'short' }) + ' • ' + date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + ' WIB';
                    }

                    let badgeColor = data.jenis === "VIP" ? "bg-purple-100 text-purple-700" : (data.jenis === "VVIP" ? "bg-yellow-100 text-yellow-700" : "bg-blue-100 text-blue-700");

                    // LOGIKA TOMBOL LUNAS (DISABLE JIKA SUDAH LUNAS)
                    const btnLunasClass = isLunas 
                        ? "bg-emerald-500 text-white cursor-not-allowed opacity-60" 
                        : "bg-gray-100 text-gray-500 hover:bg-emerald-100 hover:text-emerald-600";
                    const iconLunas = isLunas 
                        ? `<svg class="w-4 h-4 mr-1 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Lunas` 
                        : `Tandai Lunas`;
                    const atributLunas = isLunas ? "disabled" : "";

                    // LOGIKA TOMBOL CHECK-IN (DISABLE JIKA SUDAH CHECKIN)
                    const btnCheckinClass = isCheckin 
                        ? "bg-purple-600 text-white cursor-not-allowed opacity-60" 
                        : "bg-gray-100 text-gray-500 hover:bg-purple-100 hover:text-purple-600";
                    const iconCheckin = isCheckin 
                        ? `<svg class="w-4 h-4 mr-1 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg> Hadir` 
                        : `Check-in`;
                    const atributCheckin = isCheckin ? "disabled" : "";

                    const item = document.createElement('div');
                    const kataKunciStatus = `${isLunas ? 'lunas' : 'belum lunas'} ${isCheckin ? 'hadir checkin' : 'belum hadir'}`;
                    item.className = 'item-tiket p-6 hover:bg-gray-50 transition-colors flex flex-col md:flex-row md:items-center justify-between gap-4';
                    item.dataset.searchText = `${data.nama} ${data.email} ${data.jenis} ${kataKunciStatus}`.toLowerCase();

                    item.innerHTML = `
                        <div class="flex items-start gap-4 flex-1">
                            <div class="bg-gray-100 w-12 h-12 rounded-full flex items-center justify-center flex-shrink-0 text-gray-500">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            </div>
                            <div class="flex-1">
                                <h3 class="font-bold text-gray-800 text-lg leading-tight">${data.nama}</h3>
                                <p class="text-sm text-gray-500 mb-2">${data.email || '-'}</p>
                                <div class="flex items-center flex-wrap gap-2 text-xs">
                                    <span class="${badgeColor} px-2 py-1 rounded font-bold border">${data.jenis}</span>
                                    <span class="bg-gray-100 text-gray-600 px-2 py-1 rounded font-medium border border-gray-200">${data.jumlah} Tiket</span>
                                    <span class="text-gray-400 ml-1 flex items-center gap-1">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        ${waktuText}
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div class="flex flex-col sm:flex-row md:flex-col items-start sm:items-center md:items-end justify-between gap-3 mt-4 md:mt-0 border-t md:border-t-0 pt-4 md:pt-0 w-full md:w-auto min-w-[200px]">
                            <div class="text-xl font-bold text-gray-800">${formatRupiah(data.totalHarga || 0)}</div>
                            
                            <div class="flex gap-2 w-full md:w-auto">
                                <button class="btn-lunas flex-1 md:flex-none text-xs px-3 py-2 rounded-lg font-semibold transition-colors border border-transparent ${btnLunasClass}" data-id="${dokumen.id}" data-status="${isLunas}" ${atributLunas}>
                                    ${iconLunas}
                                </button>
                                <button class="btn-checkin flex-1 md:flex-none text-xs px-3 py-2 rounded-lg font-semibold transition-colors border border-transparent ${btnCheckinClass}" data-id="${dokumen.id}" data-status="${isCheckin}" ${atributCheckin}>
                                    ${iconCheckin}
                                </button>
                                <button class="btn-hapus text-gray-400 hover:text-red-500 px-2 py-2 rounded-lg transition-colors" data-id="${dokumen.id}" title="Hapus">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                        </div>
                    `;
                    daftarTiket.appendChild(item);
                });

                statTiket.textContent = totalTiketHitung;
                statUang.textContent = formatRupiah(totalUangLunas); 
                statHadir.textContent = totalHadirHitung + " Tiket"; 
                triggerSearch(); 
            });
        }

        function triggerSearch() {
            const keyword = inputSearch.value.toLowerCase();
            const items = document.querySelectorAll('.item-tiket');
            let adaYangTampil = false;

            items.forEach(item => {
                if (item.dataset.searchText.includes(keyword)) {
                    item.style.display = 'flex';
                    adaYangTampil = true;
                } else {
                    item.style.display = 'none';
                }
            });

            if (!adaYangTampil && items.length > 0) {
                pesanKosong.classList.remove('hidden');
                pesanKosong.textContent = "Pencarian tidak menemukan hasil.";
            } else {
                pesanKosong.classList.add('hidden');
            }
        }
        inputSearch.addEventListener('input', triggerSearch);

        daftarTiket.addEventListener('click', (e) => {
            const btnHapus = e.target.closest('.btn-hapus');
            const btnLunas = e.target.closest('.btn-lunas');
            const btnCheckin = e.target.closest('.btn-checkin');

            if (btnHapus) {
                bukaModal(
                    "Hapus Pesanan", 
                    "Tindakan ini tidak dapat dibatalkan. Apakah Anda yakin ingin menghapus data ini?", 
                    { tipe: 'hapus', idDoc: btnHapus.dataset.id }
                );
            }

            // Mencegah pop-up muncul jika tombol lunas sudah berstatus disable (dikunci)
            if (btnLunas && !btnLunas.disabled) {
                const isLunas = btnLunas.dataset.status === "true";
                bukaModal(
                    "Konfirmasi Pembayaran", 
                    "Tandai pembayaran tiket ini sebagai LUNAS? Tindakan ini akan dikunci dan tidak bisa dibatalkan.", 
                    { tipe: 'lunas', idDoc: btnLunas.dataset.id, statusBaru: true }
                );
            }

            // Mencegah pop-up muncul jika tombol check-in sudah berstatus disable (dikunci)
            if (btnCheckin && !btnCheckin.disabled) {
                const isCheckin = btnCheckin.dataset.status === "true";
                bukaModal(
                    "Konfirmasi Kehadiran", 
                    "Pastikan pembeli telah menunjukkan tiketnya. Tandai sebagai HADIR? Tindakan ini akan dikunci dan tidak bisa dibatalkan.", 
                    { tipe: 'checkin', idDoc: btnCheckin.dataset.id, statusBaru: true }
                );
            }
        });

        btnExport.addEventListener('click', () => {
            if (semuaDataPesanan.length === 0) {
                tampilkanPesan('Tidak ada data.', 'error'); return;
            }

            let isiCSV = "Nama Pembeli,Email,Jenis,Jumlah,Total Harga,Status Pembayaran,Status Kehadiran,Waktu Pesan\n";

            semuaDataPesanan.forEach(row => {
                let tanggal = "Belum Tercatat";
                if (row.waktuPesan) tanggal = row.waktuPesan.toDate().toLocaleString('id-ID').replace(/,/g, ''); 
                
                const statusByr = row.isLunas ? "LUNAS" : "Belum Lunas";
                const statusHadir = row.isCheckin ? "SUDAH HADIR" : "Belum Hadir";

                const baris = `"${row.nama}","${row.email}","${row.jenis}","${row.jumlah}","${row.totalHarga}","${statusByr}","${statusHadir}","${tanggal}"`;
                isiCSV += baris + "\n";
            });

            const blob = new Blob([isiCSV], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "Laporan_Penjualan_Tiket.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
